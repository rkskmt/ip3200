author: "rkskmt"
lang: ja
format:
  clean-revealjs:
    highlight-style: github
    scrollable: true
    footer: " "
    theme:
      - default
    include-in-header:
      text: |
        <style>
        .callout.callout-note {
            font-size: 1.5rem;
            line-height: 1.4;
        }
        .callout.callout-note .callout-title {
            font-size: 2.3rem;
        }
        .reveal .callout.callout-tip {
            font-size: 1.5rem;
            line-height: 1.4;
        }
        .reveal .callout.callout-tip .callout-title {
            font-size: 2.3rem;
        }
        .reveal .callout pre code {
            font-size: 1.5rem !important;
        }
        .reveal h2 {
            font-weight: bold !important;
            font-size: 2.5rem;
            margin-bottom: 10px;
            border-bottom: 1px solid #000;
        }
        .reveal h3 {
            font-style: normal !important;
            font-weight: bold !important;
            font-size: 2.3rem;
            background-color: #5dade2;
            color: white;
            padding: 20px 25px;
            margin: 12px;
            border-radius: 5px;
        }
        .reveal p {
            line-height: 1.6;
            margin: 30px 0;
        }
        .cell details {
            margin: 4px 0;
            font-size: 1.5rem;
        }
        .cell details summary {
            margin-bottom: 0px;
            padding: 4px;
        }
        .cell-output pre {
          font-size: 2.0rem;
        }
        .reveal details pre code {
          font-size: 1.5rem;
        }
        .reveal img {
          max-height: 500px;
          width: auto;
          height: auto;
        }
        .fig-small img {
          max-height: 300px !important;
        }
        .fig-medium img {
          max-height: 400px !important;
        }
        table {
          width: 100%;
          border-bottom: none !important;
        }
        table tbody {
          border-bottom: none !important;
        }
        table tr:last-child,
        table tr:last-child td {
          border-bottom: none !important;
        }
        table th:first-child,
        table td:first-child {
          font-weight: bold;
          border-right: 2px solid #aaa;
        }
        .reveal .cite {
          position: absolute;
          bottom: 6px;
          right: 6px;
          font-size: 0.4em;
          background: rgba(0,0,0,0.4);
          color: rgba(255,255,255,0.9);
          padding: 2px 6px;
          border-radius: 3px;
          z-index: 2;
        }
        .reveal .cite p {
          margin: 0;
          line-height: 1.4;
        }
        .reveal .cite a {
          color: rgba(255,255,255,0.9);
        }
        .reveal .content-box {
          position: absolute;
          top: 50%;
          left: 50%;
          transform: translate(-50%, -50%);
          background: rgba(0,0,0,0.5);
          color: white;
          padding: 20px 30px;
          border-radius: 8px;
          max-width: 60%;
          box-sizing: border-box;
          width: max-content;
        }
        .reveal .content-box.pos-br {
          position: absolute;
          bottom: 60px;
          right: 60px;
          top: auto;
          left: auto;
          transform: none;
          text-align: left;
        }
        .reveal .content-box.pos-cl {
          position: absolute;
          top: 50%;
          left: 60px;
          transform: translateY(-50%);
          text-align: left;
        }
        .reveal .fig-cite {
          position: relative;
          background-size: contain;
          background-repeat: no-repeat;
          background-position: center;
        }
        #home-btn {
          position: fixed;
          top: 12px;
          left: 12px;
          z-index: 100;
          background: #5dade2;
          color: white;
          padding: 4px 14px;
          border-radius: 4px;
          text-decoration: none;
          font-size: 1rem;
        }
        .reveal > .footer {
          display: flex !important;
          align-items: center;
          justify-content: center;
          padding: 0 16px;
          height: auto !important;
          overflow: visible !important;
          box-sizing: border-box;
        }
        #slide-nav {
          display: flex;
          align-items: center;
          gap: 8px;
        }
        #slide-nav button {
          background: transparent;
          color: #5dade2;
          border: 1px solid #5dade2;
          border-radius: 4px;
          padding: 4px 14px;
          font-size: 1rem;
          cursor: pointer;
          touch-action: manipulation;
          -webkit-tap-highlight-color: transparent;
        }
        #slide-nav button:active {
          background: rgba(93, 173, 226, 0.2);
        }
        #nav-counter {
          font-size: 0.9rem;
          min-width: 56px;
          text-align: center;
        }
        .reveal .slide-number {
          display: none !important;
        }
        pre.shell code > span > a:first-child::before {
          content: "$" !important;
          color: #888 !important;
          user-select: none !important;
        }
        .code-copy-outer-scaffold {
          position: relative !important;
          margin-top: 0.3em !important;
        }
        .code-copy-outer-scaffold:has(pre.python)::before,
        .code-copy-outer-scaffold:has(pre.shell)::before {
          position: absolute;
          top: 2px;
          right: 30px;
          font-size: 10px;
          color: #bbb;
          pointer-events: none;
          z-index: 2;
        }
        .code-copy-outer-scaffold:has(pre.python)::before {
          content: "Python";
        }
        .code-copy-outer-scaffold:has(pre.shell)::before {
          content: "Shell";
        }
        .reveal .hl {
          color: rgba(255,255,255,1);
          font-weight: bold;
          font-family: monospace;
          text-shadow:
            -3px  0   0 #0099cc,
            -3px -1px 0 #0099cc,
            -2px -2px 0 #0099cc,
            -1px -3px 0 #0099cc,
             0   -3px 0 #0099cc,
             1px -3px 0 #0099cc,
             2px -2px 0 #0099cc,
             3px -1px 0 #0099cc,
             3px  0   0 #0099cc,
             3px  1px 0 #0099cc,
             2px  2px 0 #0099cc,
             1px  3px 0 #0099cc,
             0    3px 0 #0099cc,
            -1px  3px 0 #0099cc,
            -2px  2px 0 #0099cc,
            -3px  1px 0 #0099cc;
        }
        .break-slide h2 { border: none !important; }
        .break-slide p { margin: 0 !important; }
        .break-slide .break-title {
          font-size: 1.5em;
          font-weight: bold;
          color: #333;
          border-bottom: 0.5px solid #333;
          padding-bottom: 0.1em;
        }
        .reveal ul li::marker {
          color: #0099cc;
          font-size: 1.3em;
        }
        .reveal ul ul li::before, .reveal ol ul li::before {
          font-weight: 500;
          color: #0099cc;
        }
        .reveal ul ul ul {
          list-style: none;
        }
        .reveal ul ul ul li::before {
          content: "‣";
        }
        .reveal strong {
          padding: 0 0.1em;
        }
        .reveal .fw-colon {
          font-weight: 300;
        }
        .reveal :not(pre) > code {
          color: #005cc5;
          font-weight: bold;
          font-size: 1.1em;
          padding: 0 0.15em;
          font-family: monospace, serif;
          text-shadow: none;
        }
        </style>
        <script>
        window.addEventListener('load', function() {
          if (typeof Reveal === 'undefined') return;
          function initNav() {
            var home = document.createElement('a');
            home.id = 'home-btn';
            home.href = './index.html';
            home.textContent = 'Home';
            document.body.appendChild(home);
            var footer = document.querySelector('.reveal > .footer');
            if (!footer) return;
            var nav = document.createElement('span');
            nav.id = 'slide-nav';
            nav.innerHTML = '<button id="nav-prev">&#9664;</button><span id="nav-counter"></span><button id="nav-next">&#9654;</button>';
            footer.appendChild(nav);
            function addNavHandler(el, fn) {
              var touched = false;
              el.addEventListener('touchstart', function(e) { e.stopPropagation(); touched = true; fn(); }, { passive: true });
              el.addEventListener('click', function() { if (touched) { touched = false; return; } fn(); });
            }
            addNavHandler(document.getElementById('nav-prev'), function() { Reveal.prev(); });
            addNavHandler(document.getElementById('nav-next'), function() { Reveal.next(); });
            updateCounter();
            var mo = new MutationObserver(updateCounter);
            mo.observe(document.querySelector('.reveal .slides'), { subtree: true, attributeFilter: ['class'] });
          }
          function updateCounter() {
            var el = document.getElementById('nav-counter');
            if (!el) return;
            var slides = Array.from(document.querySelectorAll('.reveal .slides section:not(.stack)'));
            var idx = slides.findIndex(function(s) { return s.classList.contains('present'); });
            el.textContent = (idx + 1) + ' / ' + slides.length;
          }
          if (Reveal.isReady()) { initNav(); } else { Reveal.addEventListener('ready', initNav); }
        });
        </script>
filters:
  - hl.lua
  - fw-colon.lua
  - cite-image.lua
